# ============================================================
# SkillHire AI - Production Application Configuration
# All secrets loaded from environment variables
# ============================================================

# Server
server.port=${PORT:8080}
server.servlet.context-path=/api

# Application Name
spring.application.name=skillhire-ai

# ============================================================
# PostgreSQL Database Configuration
# Set DATABASE_URL as: jdbc:postgresql://host:5432/dbname
# ============================================================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.file.upload-dir=${FILE_UPLOAD_DIR:./uploads/resumes}

# ============================================================
# Gemini AI API Configuration
# ============================================================
app.gemini.api.key=${GEMINI_API_KEY}
app.gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
app.gemini.timeout.connect=30
app.gemini.timeout.read=60

# ============================================================
# Email Configuration (Gmail SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:noreply@skillhire.ai}
app.frontend.url=${FRONTEND_URL:https://your-app.vercel.app}

# ============================================================
# CORS Configuration - allow Vercel + local dev
# ============================================================
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ============================================================
# Scheduler
# ============================================================
spring.task.scheduling.pool.size=5

# ============================================================
# Logging - production level
# ============================================================
logging.level.com.skillhire=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
